user nginx;
worker_processes auto;

error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

load_module modules/ngx_http_js_module.so;

events {
  worker_connections  1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

  access_log /var/log/nginx/access.log  main;

  gzip on;
  sendfile on;
  keepalive_timeout 65;  
  
  upstream app {
    server localhost:3000;
  }

  limit_req_zone $binary_remote_addr zone=login_rate:10m rate=3r/10s;
  limit_conn_zone $binary_remote_addr zone=login_conn:10m;

  server {
    listen 443 ssl;
    server_name example.com;

    ssl_certificate /etc/nginx/example.com.crt;
    ssl_certificate_key /etc/nginx/example.com.key;

    location ~ ^/(ru|kz|en)/login(/init|/complete)?$ {
      limit_req zone=login_rate burst=3 nodelay;
      limit_req_status 429;
      limit_conn zone=login_conn 3;
      limit_conn_status 503;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_pass http://app$request_uri;
    }
    
    error_log /var/log/nginx/example.com.error_log debug;
    access_log /var/log/nginx/example.com.access_log combined;
  }
}